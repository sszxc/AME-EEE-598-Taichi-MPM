sim:
  dim: 3
  n_grid: 64
  steps: 25
  dt: 4.0e-4
  n_particles: 1000
  gravity: [0.0, -9.8, 0.0]
  bound: 3

material:
  p_rho: 1.0
  E: 1000.0
  nu: 0.2

sdf:
  res: 64
  cache_enabled: true

offline:
  simulation_duration_seconds: 5.0

particles:
  presets:
    - name: Snow
      volumes:
        - kind: cube
          minimum: [0.2, 0.5, 0.2]
          size: [0.6, 0.4, 0.6]
          material: snow

obstacles:
  presets:
    - name: Cube
      kind: box
      half_xz: 0.2
      height: 0.4
      center_xz: [0.5, 0.5]
    - name: Sphere
      kind: mesh
      path: assets/sphere.obj
      scale: 0.3
      center: [0.5, 0.2, 0.5]
    - name: Old Main
      kind: mesh
      path: assets/old_main_Meshy.obj
      scale: 0.4
      center: [0.5, 0.2, 0.5]
